<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cottage Rummy Stats</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 25px;
      background: #f7f9fc;
      color: #333;
      transition: background 0.3s, color 0.3s;
    }
    body.dark-mode {
      background: #121212;
      color: #fff;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    #fileDate {
      font-weight: bold;
      margin-top: 5px;
      font-size: 0.85em;
    }

    #darkToggle {
      padding: 10px 16px;
      border-radius: 8px;
      background: #4285F4;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    body.dark-mode #darkToggle {
      background: #B388FF;
      color: black;
    }

    #playerCountFilter {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-left: 10px;
    }

    #topBar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 15px;
    }

    .player-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 25px;
      margin-top: 30px;
    }

    .player-chart-box {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }
    body.dark-mode .player-chart-box {
      background: #1E1E1E;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.75em;
      font-weight: 600;
      margin-right: 6px;
      margin-bottom: 6px;
      color: white;
    }
    .badge-light {
      background: #4285F4;
    }
    .badge-dark {
      background: #00E5FF;
      color: black;
    }

    canvas {
      width: 100% !important;
      max-height: 350px;
    }

    #statusMsg {
      margin-top: 8px;
      font-size: 0.85em;
    }

    #notesBox {
      margin-top: 40px;
      padding: 20px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      max-width: 900px;
    }
    body.dark-mode #notesBox {
      background: #1E1E1E;
    }
  </style>
</head>

<body>

<h2>Cottage Rummy – Player Statistics</h2>

<p id="fileDate">Last Game Data Entry: Loading data...</p>

<div id="topBar">
  <button id="darkToggle">🌙 Dark Mode</button>

  <div>
    <label><b>Filter by number of players:</b></label>
    <select id="playerCountFilter">
      <option value="all">All</option>
      <option value="3">3 Players</option>
      <option value="4">4 Players</option>
      <option value="5">5 Players</option>
      <option value="6">6 Players</option>
      <option value="7">7 Players</option>
    </select>
  </div>
</div>

<div id="statusMsg">Loading data...</div>

<div class="player-grid" id="playerGrid"></div>

<div id="notesBox">
  <h3>Notes</h3>
  <p><strong>Win Rate %</strong> — Percentage of games a player finished in <strong>1st place</strong>.</p>
  <p><strong>Average Placement</strong> — The player’s <strong>average finishing position</strong> across all games they played.</p>
</div>

<script>
const EXCEL_URL = "https://tomkum123.github.io/CottageRummy/Cottage%20Rummy%20Data%20File.xlsx";

let results = [];
let playerCharts = {};
let darkMode = false;

// ⭐ Load Excel instead of CSV
async function loadExcel() {
  const res = await fetch(EXCEL_URL);
  const arrayBuffer = await res.arrayBuffer();
  const workbook = XLSX.read(arrayBuffer, { type: "array" });
  const sheet = workbook.Sheets[workbook.SheetNames[0]];

  return XLSX.utils.sheet_to_json(sheet, { defval: "" });
}
