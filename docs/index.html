<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cottage Rummy – Game Entry</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 25px;
      background: #f7f9fc;
      color: #333;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .player-row {
      margin-bottom: 12px;
    }

    label {
      display: inline-block;
      width: 120px;
      font-weight: bold;
    }

    input[type="number"] {
      width: 100px;
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    input[type="date"] {
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    #submitBtn {
      margin-top: 20px;
      padding: 10px 18px;
      background: #4285F4;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    #statusMsg {
      margin-top: 15px;
      font-size: 0.9em;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Cottage Rummy – Add Game Entry</h2>

<p><strong>Date:</strong></p>
<input type="date" id="gameDate" />

<h3>Enter Scores</h3>

<div class="player-row">
  <label>Christine:</label>
  <input type="number" id="Christine" />
</div>

<div class="player-row">
  <label>Michael:</label>
  <input type="number" id="Michael" />
</div>

<div class="player-row">
  <label>Alaura:</label>
  <input type="number" id="Alaura" />
</div>

<div class="player-row">
  <label>Matthew:</label>
  <input type="number" id="Matthew" />
</div>

<div class="player-row">
  <label>Kirby:</label>
  <input type="number" id="Kirby" />
</div>

<div class="player-row">
  <label>Annmarie:</label>
  <input type="number" id="Annmarie" />
</div>

<div class="player-row">
  <label>Tom:</label>
  <input type="number" id="Tom" />
</div>

<button id="submitBtn">Add Game to CSV</button>

<p id="statusMsg"></p>

<script>
// Players must match analyzer.js exactly
const players = ["Christine","Michael","Alaura","Matthew","Kirby","Annmarie","Tom"];

// ⭐ Ensures ISO format ALWAYS
function getISODateFromInput() {
  const raw = document.getElementById("gameDate").value;
  if (!raw) return null; // user didn't pick a date
  return raw; // <input type="date"> already returns YYYY-MM-DD
}

document.getElementById("submitBtn").addEventListener("click", async () => {
  const date = getISODateFromInput();

  if (!date) {
    document.getElementById("statusMsg").innerText =
      "Please select a date.";
    return;
  }

  // Build CSV row with EXACT column order
  const row = [
    date,
    document.getElementById("Christine").value || "",
    document.getElementById("Michael").value || "",
    document.getElementById("Alaura").value || "",
    document.getElementById("Matthew").value || "",
    document.getElementById("Kirby").value || "",
    document.getElementById("Annmarie").value || "",
    document.getElementById("Tom").value || ""
  ].join(",");

  // ⭐ IMPORTANT:
  // GitHub Pages cannot be written to directly.
  // Most users download the CSV, append the row, and re-upload.
  // So we provide the row for copy/paste.

  document.getElementById("statusMsg").innerText =
    "Copy this row into your CSV:\n" + row;
});
</script>

</body>
</html>
