<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cottage Rummy – Data Entry App</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 25px;
      background: #f7f9fc;
      color: #333;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 10px;
      text-align: center;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .card h3 {
      margin-top: 0;
      font-size: 20px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 6px;
    }

    .input-row {
      margin-bottom: 12px;
    }

    label {
      display: inline-block;
      width: 140px;
      font-weight: bold;
    }

    input[type="number"],
    input[type="date"],
    input[type="text"] {
      padding: 6px;
      width: 180px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 16px;
      margin-right: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    #saveBtn { background: #34A853; color: white; }
    #tokenBtn { background: #4285F4; color: white; }
    #clearBtn { background: #EA4335; color: white; }

    #status {
      margin-top: 20px;
      font-size: 0.9em;
      font-weight: bold;
      text-align: center;
    }

    .last-entry {
      background: #f9fafc;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-top: 10px;
    }

    .last-entry p {
      margin: 4px 0;
      font-size: 14px;
    }

    /* MOBILE COMPACT */
    @media (max-width: 700px) {
      label {
        width: 100%;
        margin-bottom: 6px;
      }

      .input-row {
        display: block;
      }

      input {
        width: 100%;
      }

      button {
        width: 100%;
        margin-bottom: 10px;
      }
    }
  </style>
</head>

<body>

<h2>Cottage Rummy – Data Entry App</h2>

<div class="card">
  <h3>Last Game Entry</h3>
  <div id="lastEntryBox" class="last-entry">
    <p>Loading last entry...</p>
  </div>
</div>

<div class="card">
  <h3>New Game Entry</h3>

  <div class="input-row">
    <label>Date:</label>
    <input type="date" id="gameDate">
  </div>

  <div id="playerInputs"></div>
</div>

<div class="card">
  <h3>GitHub Token</h3>
  <div class="input-row">
    <label>Token:</label>
    <input type="text" id="tokenInput" placeholder="Enter GitHub token">
  </div>
  <button id="tokenBtn">Save Token</button>
</div>

<div class="card">
  <button id="saveBtn">Commit to GitHub</button>
  <button id="clearBtn">Clear Local Entries</button>
</div>

<p id="status"></p>

<script>
const players = ["Christine","Michael","Alaura","Matthew","Kirby","Annmarie","Tom"];
const repoOwner = "tomkum123";
const repoName = "CottageRummy";
const filePath = "docs/Cottage Rummy Data File.csv";

let localEntries = JSON.parse(localStorage.getItem("rummyEntries") || "[]");

// Build player inputs
const container = document.getElementById("playerInputs");
players.forEach(p => {
  const div = document.createElement("div");
  div.className = "input-row";
  div.innerHTML = `
    <label>${p}:</label>
    <input type="number" id="score_${p}" placeholder="Score or blank">
  `;
  container.appendChild(div);
});

// Normalize dates
function normalizeDate(dateStr) {
  if (!dateStr) return "";
  if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
  if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(dateStr)) {
    const [m, d, y] = dateStr.split("/");
    return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  }
  const dt = new Date(dateStr);
  if (!isNaN(dt)) {
    const y = dt.getFullYear();
    const m = String(dt.getMonth()+1).padStart(2,"0");
    const d = String(dt.getDate()).padStart(2,"0");
    return `${y}-${m}-${d}`;
  }
  return dateStr;
}

// Load last entry
async function loadLastEntry() {
  const token = localStorage.getItem("githubToken");
  if (!token) {
    document.getElementById("lastEntryBox").innerHTML =
      "<p>No token saved. Cannot load last entry.</p>";
    return;
  }

  const res = await fetch(
    `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${filePath}`,
    { headers: { Authorization: `Bearer ${token}` } }
  );

  if (!res.ok) {
    document.getElementById("lastEntryBox").innerHTML =
      "<p>Could not load CSV.</p>";
    return;
  }

  const meta = await res.json();
  const csvText = atob(meta.content);
  const lines = csvText.trim().split("\n");

  const headers = lines[0].split(",");
  const lastLine = lines[lines.length - 1].split(",");

  let lastEntry = {};
  headers.forEach((h, i) => lastEntry[h] = lastLine[i]);

  lastEntry.Date = normalizeDate(lastEntry.Date);

  let html = `<p><strong>Date:</strong> ${lastEntry.Date}</p>`;
  players.forEach(p => {
    html += `<p><strong>${p}:</strong> ${lastEntry[p] || ""}</p>`;
  });

  document.getElementById("lastEntryBox").innerHTML = html;
}

// Save token
document.getElementById("tokenBtn").onclick = () => {
  const input = document.getElementById("tokenInput");
  const token = input && input.value ? input.value.trim() : "";

  if (!token) {
    document.getElementById("status").innerText = "Token cannot be empty.";
    return;
  }

  localStorage.setItem("githubToken", token);
  document.getElementById("status").innerText = "Token saved.";
  loadLastEntry();
};

// Add game locally
function addLocalGame() {
  const date = document.getElementById("gameDate").value;
  if (!date) {
    document.getElementById("status").innerText = "Please select a date.";
    return;
  }

  const row = { Date: date };
  players.forEach(p => {
    const val = document.getElementById("score_" + p).value;
    row[p] = val ? val : "";
  });

  localEntries.push(row);
  localStorage.setItem("rummyEntries", JSON.stringify(localEntries));
}

// Commit to GitHub
document.getElementById("saveBtn").onclick = async () => {
  addLocalGame();

  const token = localStorage.getItem("githubToken");
  if (!token) {
    document.getElementById("status").innerText = "No GitHub token saved.";
    return;
  }

  document.getElementById("status").innerText = "Loading existing CSV...";

  const metaRes = await fetch(
    `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${filePath}`,
    { headers: { Authorization: `Bearer ${token}` } }
  );

  if (!metaRes.ok) {
    document.getElementById("status").innerText = "Failed to load CSV.";
    return;
  }

  const meta = await metaRes.json();
  const csvText = atob(meta.content);
  const lines = csvText.trim().split("\n");
  const headers = lines[0].split(",");

  const existingRows = lines.slice(1).map(line => {
    const cols = line.split(",");
    const obj = {};
    headers.forEach((h, i) => obj[h] = cols[i]);
    return obj;
  });

  const merged = [...existingRows, ...localEntries].map(r => ({
    Date: normalizeDate(r.Date),
    Christine: r.Christine || "",
    Michael: r.Michael || "",
    Alaura: r.Alaura || "",
    Matthew: r.Matthew || "",
    Kirby: r.Kirby || "",
    Annmarie: r.Annmarie || "",
    Tom: r.Tom || ""
  }));

  const csvLines = ["Date,Christine,Michael,Alaura,Matthew,Kirby,Annmarie,Tom"];
  merged.forEach(r => {
    csvLines.push([
      r.Date,
      r.Christine,
      r.Michael,
      r.Alaura,
      r.Matthew,
      r.Kirby,
      r.Annmarie,
      r.Tom
    ].join(","));
  });

  const newCSV = csvLines.join("\n");
  const encoded = btoa(newCSV);

  const commitRes = await fetch(
    `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${filePath}`,
    {
      method: "PUT",
      headers: {
        Authorization: `Bearer ${token}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "Normalize dates and update Cottage Rummy Data File",
        content: encoded,
        sha: meta.sha
      })
    }
  );

  if (commitRes.ok) {
    document.getElementById("status").innerText =
      "CSV updated. Dates normalized.";
    localEntries = [];
    localStorage.removeItem("rummyEntries");
    loadLastEntry();
  } else {
    document.getElementById("status").innerText =
      "Commit failed. Check token permissions.";
  }
};

// Clear local entries
document.getElementById("clearBtn").onclick = () => {
  localEntries = [];
  localStorage.removeItem("rummyEntries");
  document.getElementById("status").innerText = "Local entries cleared.";
};

// Load last entry on startup
loadLastEntry();

// Register service worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
