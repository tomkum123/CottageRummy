<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cottage Rummy – Data Entry App</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 25px;
      background: linear-gradient(135deg, #eef3ff, #ffffff);
      color: #333;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 10px;
      text-align: center;
      color: #2a3f8b;
    }

    .card {
      background: linear-gradient(135deg, #ffffff, #f0f4ff);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      border-left: 5px solid #4a6cf7;
    }

    .card h3 {
      margin-top: 0;
      font-size: 20px;
      color: #2a3f8b;
      border-bottom: 1px solid #ddd;
      padding-bottom: 6px;
    }

    .input-row {
      margin-bottom: 12px;
    }

    label {
      display: inline-block;
      width: 140px;
      font-weight: bold;
      color: #2a3f8b;
    }

    input[type="number"],
    input[type="date"],
    input[type="text"] {
      padding: 6px;
      width: 180px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #f9faff;
    }

    button {
      padding: 10px 16px;
      margin-right: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.1s ease;
    }

    button:hover {
      transform: scale(1.05);
    }

    #saveBtn { background: #34A853; color: white; }
    #tokenBtn { background: #4285F4; color: white; }
    #clearBtn { background: #EA4335; color: white; }
    #refreshLastBtn { background: #4285F4; color: white; }

    #status {
      margin-top: 20px;
      font-size: 0.9em;
      font-weight: bold;
      text-align: center;
      color: #2a3f8b;
    }

    .last-entry {
      background: #eef3ff;
      padding: 12px;
      border-radius: 8px;
      border-left: 4px solid #4285F4;
      margin-top: 10px;
    }

    .last-entry p {
      margin: 4px 0;
      font-size: 14px;
    }

    .pending-list {
      background: #f7f9ff;
      padding: 10px;
      border-radius: 8px;
      border-left: 4px solid #34A853;
      margin-top: 10px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 13px;
    }

    .pending-item {
      margin-bottom: 6px;
      border-bottom: 1px dashed #ccc;
      padding-bottom: 4px;
    }

    @media (max-width: 700px) {
      label {
        width: 100%;
        margin-bottom: 6px;
      }
      .input-row {
        display: block;
      }
      input {
        width: 100%;
      }
      button {
        width: 100%;
        margin-bottom: 10px;
      }
    }
  </style>

  <!-- Lighter SheetJS build to reduce CPU -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.core.min.js"></script>
</head>

<body>

<h2>Cottage Rummy – Data Entry App</h2>

<div class="card">
  <h3>Last Game Entry</h3>
  <div id="lastEntryBox" class="last-entry">
    <p>Loading last entry...</p>
  </div>
  <button id="refreshLastBtn">Refresh Last Entry</button>
</div>

<div class="card">
  <h3>New Game Entry</h3>

  <div class="input-row">
    <label>Date:</label>
    <input type="date" id="gameDate">
  </div>

  <div id="playerInputs"></div>
</div>

<div class="card">
  <h3>Pending Local Entries (not yet committed)</h3>
  <div id="pendingBox" class="pending-list">
    <p>No pending entries.</p>
  </div>
</div>

<div class="card">
  <h3>GitHub Token</h3>
  <div class="input-row">
    <label>Token:</label>
    <input type="text" id="tokenInput" placeholder="Enter GitHub token">
  </div>
  <button id="tokenBtn">Save Token</button>
</div>

<div class="card">
  <button id="saveBtn">Commit to GitHub</button>
  <button id="clearBtn">Clear Local Entries</button>
</div>

<p id="status"></p>

<script>
const players = ["Christine","Michael","Alaura","Matthew","Kirby","Annmarie","Tom"];
const repoOwner = "tomkum123";
const repoName = "CottageRummy";
const filePath = "docs/Cottage Rummy Data File.xlsx";

let localEntries = JSON.parse(localStorage.getItem("rummyEntries") || "[]");

// Build player inputs
const container = document.getElementById("playerInputs");
players.forEach(p => {
  const div = document.createElement("div");
  div.className = "input-row";
  div.innerHTML = `
    <label>${p}:</label>
    <input type="number" id="score_${p}" placeholder="Score or blank" step="1">
  `;
  container.appendChild(div);
});

// Robust Excel-aware date normalizer
function normalizeDate(value) {
  if (value == null || value === "" || value === 0) return "";

  if (typeof value === "string" && /^\d{4}-\d{2}-\d{2}$/.test(value)) {
    return value;
  }

  if (typeof value === "number") {
    const base = new Date(Date.UTC(1899, 11, 30));
    const ms = base.getTime() + value * 86400000;
    const dt = new Date(ms);

    const y = dt.getUTCFullYear();
    const m = String(dt.getUTCMonth() + 1).padStart(2, "0");
    const d = String(dt.getUTCDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  if (typeof value === "string") {
    const dt = new Date(value);
    if (!isNaN(dt)) {
      const y = dt.getFullYear();
      const m = String(dt.getMonth() + 1).padStart(2, "0");
      const d = String(dt.getDate()).toString().padStart(2, "0");
      return `${y}-${m}-${d}`;
    }
  }

  return "";
}

// Render pending local entries
function renderPending() {
  const box = document.getElementById("pendingBox");
  if (!localEntries.length) {
    box.innerHTML = "<p>No pending entries.</p>";
    return;
  }

  let html = "";
  localEntries.forEach((row, idx) => {
    html += `<div class="pending-item"><strong>${idx + 1}.</strong> Date: ${row.Date || ""}`;
    players.forEach(p => {
      if (row[p] !== "" && row[p] != null) {
        html += ` | ${p}: ${row[p]}`;
      }
    });
    html += "</div>";
  });
  box.innerHTML = html;
}

// Load last entry from XLSX
async function loadLastEntry() {
  const token = localStorage.getItem("githubToken");
  if (!token) {
    document.getElementById("lastEntryBox").innerHTML =
      "<p>No token saved. Cannot load last entry.</p>";
    return;
  }

  document.getElementById("lastEntryBox").innerHTML =
    "<p>Loading last entry from GitHub...</p>";

  try {
    const res = await fetch(
      `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${encodeURIComponent(filePath)}`,
      { headers: { Authorization: `Bearer ${token}` } }
    );

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      const msg = err.message || "Could not load the Excel file.";
      document.getElementById("lastEntryBox").innerHTML =
        `<p>Error loading XLSX: ${msg}</p>`;
      return;
    }

    const meta = await res.json();

    const binary = atob(meta.content);
    const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
    const workbook = XLSX.read(bytes, { type: "array" });

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, {
      defval: "",
      raw: false // treat dates as strings where possible
    });

    if (!rows.length) {
      document.getElementById("lastEntryBox").innerHTML =
        "<p>No rows found in XLSX.</p>";
      return;
    }

    const lastEntry = rows[rows.length - 1];

    const dateStr = normalizeDate(lastEntry.Date);
    let html = `<p><strong>Date:</strong> ${dateStr}</p>`;
    players.forEach(p => {
      html += `<p><strong>${p}:</strong> ${lastEntry[p] || ""}</p>`;
    });

    document.getElementById("lastEntryBox").innerHTML = html;
  } catch (e) {
    document.getElementById("lastEntryBox").innerHTML =
      `<p>Unexpected error loading last entry: ${e.message}</p>`;
  }
}

// Save token
document.getElementById("tokenBtn").onclick = () => {
  const token = document.getElementById("tokenInput").value.trim();
  if (!token) {
    document.getElementById("status").innerText = "Token cannot be empty.";
    return;
  }
  localStorage.setItem("githubToken", token);
  document.getElementById("status").innerText = "Token saved.";
  loadLastEntry();
};

// Validate and build a local game row
function buildGameRow() {
  const date = document.getElementById("gameDate").value;
  if (!date) {
    document.getElementById("status").innerText = "Please select a date.";
    return null;
  }

  const normalizedDate = normalizeDate(date);
  const row = { Date: normalizedDate };

  let anyScore = false;
  for (const p of players) {
    const input = document.getElementById("score_" + p);
    const val = input.value.trim();

    if (val === "") {
      row[p] = "";
      continue;
    }

    const num = Number(val);
    if (!Number.isFinite(num)) {
      document.getElementById("status").innerText =
        `Invalid score for ${p}. Please enter a number or leave blank.`;
      return null;
    }

    anyScore = true;
    row[p] = num;
  }

  if (!anyScore) {
    document.getElementById("status").innerText =
      "At least one player must have a score.";
    return null;
  }

  return row;
}

// Check for duplicate in localEntries (same date + same scores)
function isDuplicateLocal(row) {
  return localEntries.some(existing => {
    if (existing.Date !== row.Date) return false;
    for (const p of players) {
      if (String(existing[p] || "") !== String(row[p] || "")) {
        return false;
      }
    }
    return true;
  });
}

// Add game locally
function addLocalGame() {
  const row = buildGameRow();
  if (!row) return;

  if (isDuplicateLocal(row)) {
    document.getElementById("status").innerText =
      "This game entry already exists in local pending entries.";
    return;
  }

  localEntries.push(row);
  localStorage.setItem("rummyEntries", JSON.stringify(localEntries));
  renderPending();
  document.getElementById("status").innerText =
    "Game added to local pending entries.";
}

// Commit XLSX to GitHub
document.getElementById("saveBtn").onclick = async () => {
  // First add current form as a local game (if valid)
  addLocalGame();

  if (!localEntries.length) {
    return;
  }

  const token = localStorage.getItem("githubToken");
  if (!token) {
    document.getElementById("status").innerText = "No GitHub token saved.";
    return;
  }

  document.getElementById("status").innerText = "Loading existing XLSX...";

  try {
    const metaRes = await fetch(
      `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${encodeURIComponent(filePath)}`,
      { headers: { Authorization: `Bearer ${token}` } }
    );

    if (!metaRes.ok) {
      const err = await metaRes.json().catch(() => ({}));
      const msg = err.message || "Failed to load XLSX.";
      document.getElementById("status").innerText =
        `Failed to load XLSX: ${msg}`;
      return;
    }

    const meta = await metaRes.json();

    const binary = atob(meta.content);
    const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
    const workbook = XLSX.read(bytes, { type: "array" });

    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const existingRows = XLSX.utils.sheet_to_json(sheet, {
      defval: "",
      raw: false
    });

    // Merge existing rows + local entries
    const merged = [...existingRows];

    // Avoid duplicates against existingRows (same Date + scores)
    localEntries.forEach(row => {
      const exists = existingRows.some(er => {
        if (normalizeDate(er.Date) !== row.Date) return false;
        for (const p of players) {
          if (String(er[p] || "") !== String(row[p] || "")) {
            return false;
          }
        }
        return true;
      });
      if (!exists) {
        merged.push(row);
      }
    });

    const newSheet = XLSX.utils.json_to_sheet(merged, {
      cellDates: false // keep dates as text
    });
    const newWorkbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(newWorkbook, newSheet, "Sheet1");

    const xlsxBinary = XLSX.write(newWorkbook, {
      bookType: "xlsx",
      type: "binary"
    });

    const encoded = btoa(
      xlsxBinary.split("").map(c => String.fromCharCode(c.charCodeAt(0))).join("")
    );

    document.getElementById("status").innerText = "Committing updated XLSX to GitHub...";

    const commitRes = await fetch(
      `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${encodeURIComponent(filePath)}`,
      {
        method: "PUT",
        headers: {
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: "Update XLSX with new Cottage Rummy entries",
          content: encoded,
          sha: meta.sha
        })
      }
    );

    if (commitRes.ok) {
      document.getElementById("status").innerText =
        "XLSX updated successfully!";
      localEntries = [];
      localStorage.removeItem("rummyEntries");
      renderPending();
      loadLastEntry();
    } else {
      const err = await commitRes.json().catch(() => ({}));
      const msg = err.message || "Commit failed. Check token permissions.";
      document.getElementById("status").innerText =
        `Commit failed: ${msg}`;
    }
  } catch (e) {
    document.getElementById("status").innerText =
      `Unexpected error during commit: ${e.message}`;
  }
};

// Clear local entries
document.getElementById("clearBtn").onclick = () => {
  localEntries = [];
  localStorage.removeItem("rummyEntries");
  renderPending();
  document.getElementById("status").innerText = "Local entries cleared.";
};

// Refresh last entry button
document.getElementById("refreshLastBtn").onclick = () => {
  loadLastEntry();
};

// Initial render
renderPending();
loadLastEntry();

// Register service worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
