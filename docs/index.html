<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cottage Rummy – Data Entry App</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 25px;
      background: linear-gradient(135deg, #eef3ff, #ffffff);
      color: #333;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 10px;
      text-align: center;
      color: #2a3f8b;
    }

    .card {
      background: linear-gradient(135deg, #ffffff, #f0f4ff);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      border-left: 5px solid #4a6cf7;
    }

    .card h3 {
      margin-top: 0;
      font-size: 20px;
      color: #2a3f8b;
      border-bottom: 1px solid #ddd;
      padding-bottom: 6px;
    }

    .input-row {
      margin-bottom: 12px;
    }

    label {
      display: inline-block;
      width: 140px;
      font-weight: bold;
      color: #2a3f8b;
    }

    input[type="number"],
    input[type="date"],
    input[type="text"] {
      padding: 6px;
      width: 180px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background: #f9faff;
    }

    button {
      padding: 10px 16px;
      margin-right: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.1s ease;
    }

    button:hover {
      transform: scale(1.05);
    }

    #saveBtn { background: #34A853; color: white; }
    #tokenBtn { background: #4285F4; color: white; }
    #clearBtn { background: #EA4335; color: white; }

    #status {
      margin-top: 20px;
      font-size: 0.9em;
      font-weight: bold;
      text-align: center;
      color: #2a3f8b;
    }

    .last-entry {
      background: #eef3ff;
      padding: 12px;
      border-radius: 8px;
      border-left: 4px solid #4285F4;
      margin-top: 10px;
    }

    .last-entry p {
      margin: 4px 0;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      label {
        width: 100%;
        margin-bottom: 6px;
      }
      .input-row {
        display: block;
      }
      input {
        width: 100%;
      }
      button {
        width: 100%;
        margin-bottom: 10px;
      }
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

<h2>Cottage Rummy – Data Entry App</h2>

<div class="card">
  <h3>Last Game Entry</h3>
  <div id="lastEntryBox" class="last-entry">
    <p>Loading last entry...</p>
  </div>
</div>

<div class="card">
  <h3>New Game Entry</h3>

  <div class="input-row">
    <label>Date:</label>
    <input type="date" id="gameDate">
  </div>

  <div id="playerInputs"></div>
</div>

<div class="card">
  <h3>GitHub Token</h3>
  <div class="input-row">
    <label>Token:</label>
    <input type="text" id="tokenInput" placeholder="Enter GitHub token">
  </div>
  <button id="tokenBtn">Save Token</button>
</div>

<div class="card">
  <button id="saveBtn">Commit to GitHub</button>
  <button id="clearBtn">Clear Local Entries</button>
</div>

<p id="status"></p>

<script>
const players = ["Christine","Michael","Alaura","Matthew","Kirby","Annmarie","Tom"];
const repoOwner = "tomkum123";
const repoName = "CottageRummy";
const filePath = "docs/Cottage Rummy Data File.xlsx";

let localEntries = JSON.parse(localStorage.getItem("rummyEntries") || "[]");

// Build player inputs
const container = document.getElementById("playerInputs");
players.forEach(p => {
  const div = document.createElement("div");
  div.className = "input-row";
  div.innerHTML = `
    <label>${p}:</label>
    <input type="number" id="score_${p}" placeholder="Score or blank">
  `;
  container.appendChild(div);
});

// Normalize dates
function normalizeDate(dateStr) {
  if (!dateStr) return "";
  if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
  const dt = new Date(dateStr);
  if (!isNaN(dt)) {
    const y = dt.getFullYear();
    const m = String(dt.getMonth()+1).padStart(2,"0");
    const d = String(dt.getDate()).padStart(2,"0");
    return `${y}-${m}-${d}`;
  }
  return dateStr;
}

// Load last entry from XLSX
async function loadLastEntry() {
  const token = localStorage.getItem("githubToken");
  if (!token) {
    document.getElementById("lastEntryBox").innerHTML =
      "<p>No token saved. Cannot load last entry.</p>";
    return;
  }

  const res = await fetch(
    `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${filePath}`,
    { headers: { Authorization: `Bearer ${token}` } }
  );

  if (!res.ok) {
    document.getElementById("lastEntryBox").innerHTML =
      "<p>Could not load XLSX.</p>";
    return;
  }

  const meta = await res.json();

  // Decode XLSX
  const binary = atob(meta.content);
  const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
  const workbook = XLSX.read(bytes, { type: "array" });

  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });

  const lastEntry = rows[rows.length - 1];

  let html = `<p><strong>Date:</strong> ${normalizeDate(lastEntry.Date)}</p>`;
  players.forEach(p => {
    html += `<p><strong>${p}:</strong> ${lastEntry[p] || ""}</p>`;
  });

  document.getElementById("lastEntryBox").innerHTML = html;
}

// Save token
document.getElementById("tokenBtn").onclick = () => {
  const token = document.getElementById("tokenInput").value.trim();
  if (!token) {
    document.getElementById("status").innerText = "Token cannot be empty.";
    return;
  }
  localStorage.setItem("githubToken", token);
  document.getElementById("status").innerText = "Token saved.";
  loadLastEntry();
};

// Add game locally
function addLocalGame() {
  const date = document.getElementById("gameDate").value;
  if (!date) {
    document.getElementById("status").innerText = "Please select a date.";
    return;
  }

  const row = { Date: normalizeDate(date) };
  players.forEach(p => {
    const val = document.getElementById("score_" + p).value;
    row[p] = val ? val : "";
  });

  localEntries.push(row);
  localStorage.setItem("rummyEntries", JSON.stringify(localEntries));
}

// Commit XLSX to GitHub
document.getElementById("saveBtn").onclick = async () => {
  addLocalGame();

  const token = localStorage.getItem("githubToken");
  if (!token) {
    document.getElementById("status").innerText = "No GitHub token saved.";
    return;
  }

  document.getElementById("status").innerText = "Loading existing XLSX...";

  const metaRes = await fetch(
    `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${filePath}`,
    { headers: { Authorization: `Bearer ${token}` } }
  );

  if (!metaRes.ok) {
    document.getElementById("status").innerText = "Failed to load XLSX.";
    return;
  }

  const meta = await metaRes.json();

  // Decode XLSX
  const binary = atob(meta.content);
  const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
  const workbook = XLSX.read(bytes, { type: "array" });

  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  const existingRows = XLSX.utils.sheet_to_json(sheet, { defval: "" });

  const merged = [...existingRows, ...localEntries];

  // Convert merged rows back to XLSX
  const newSheet = XLSX.utils.json_to_sheet(merged);
  const newWorkbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(newWorkbook, newSheet, "Sheet1");

  // Generate binary XLSX
  const xlsxBinary = XLSX.write(newWorkbook, { bookType: "xlsx", type: "binary" });

  // Convert binary → base64
  const encoded = btoa(
    xlsxBinary.split("").map(c => String.fromCharCode(c.charCodeAt(0))).join("")
  );

  const commitRes = await fetch(
    `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${filePath}`,
    {
      method: "PUT",
      headers: {
        Authorization: `Bearer ${token}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "Update XLSX with new Cottage Rummy entries",
        content: encoded,
        sha: meta.sha
      })
    }
  );

  if (commitRes.ok) {
    document.getElementById("status").innerText =
      "XLSX updated successfully!";
    localEntries = [];
    localStorage.removeItem("rummyEntries");
    loadLastEntry();
  } else {
    document.getElementById("status").innerText =
      "Commit failed. Check token permissions.";
  }
};

// Clear local entries
document.getElementById("clearBtn").onclick = () => {
  localEntries = [];
  localStorage.removeItem("rummyEntries");
  document.getElementById("status").innerText = "Local entries cleared.";
};

// Load last entry on startup
loadLastEntry();

// Register service worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
